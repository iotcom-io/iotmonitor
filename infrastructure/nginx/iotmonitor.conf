server {
    listen 80;
    server_name monitor.iotcom.io;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name monitor.iotcom.io;

    ssl_certificate /etc/letsencrypt/live/monitor.iotcom.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.iotcom.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # Frontend
    location / {
        root /var/www/monitor;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API — use internal port 5001 (not 5002)
    # 5002 is the HOST-mapped port; inside the Docker network containers talk on 5001.
    location /api/ {
        proxy_pass http://iotmonitor-backend:5001/api/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Socket.IO WebSocket proxy — required for real-time terminal
    location /socket.io/ {
        proxy_pass http://iotmonitor-backend:5001/socket.io/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for persistent terminal sessions
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}
